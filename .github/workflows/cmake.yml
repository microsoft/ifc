name: CMake

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v3

    - name: Install MSVC Build Tools Insiders
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $installer = Join-Path $env:TEMP 'vs_buildtools.exe'
        Invoke-WebRequest -Uri 'https://aka.ms/vs/insiders/vs_buildtools.exe' -OutFile $installer
        & $installer --quiet --wait --norestart --nocache `
          --add Microsoft.VisualStudio.Workload.VCTools `
          --includeRecommended
        if ($LASTEXITCODE -ne 0 -and $LASTEXITCODE -ne 3010) {
          throw "MSVC Build Tools Insiders installation failed with exit code $LASTEXITCODE"
        }

    - name: Use GitHub Actions provided vcpkg
      shell: pwsh
      run: Add-Content "$env:GITHUB_ENV" "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT"

    - name: Configure CMake
      shell: pwsh
      run: cmake "--preset=ci-$("${{matrix.os}}".split("-")[0])"
        -D CMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --config Release

    - name: Install
      run: |
        cmake --install build --prefix prefix --config Release --component Printer
        cmake --install build --prefix prefix --config Release --component Development

    - name: Test
      working-directory: build
      run: ctest -C Release
